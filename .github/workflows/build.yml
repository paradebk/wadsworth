name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Pushes to main run independently; PRs cancel their own previous runs.
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # On every push to main: bump the patch version, commit + tag, push back.
  # The build matrix below checks out the post-bump SHA so all three platforms
  # package the same new version. GITHUB_TOKEN pushes don't trigger new
  # workflow runs, so there's no recursion.
  bump:
    name: Bump version
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
      version: ${{ steps.commit.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and push
        id: commit
        run: |
          npm version patch -m "chore: release v%s"
          NEW_VERSION=$(node -p "require('./package.json').version")
          git push --follow-tags
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build for ${{ matrix.os }}
    needs: [bump]
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On push: post-bump SHA so we package the new version.
          # On PR / workflow_dispatch: the triggering ref (default).
          ref: ${{ needs.bump.outputs.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      # On push to main: publish artifacts to the draft GitHub Release.
      # On PR: build only — no publishing, no release pollution.
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --arm64 --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --x64 --arm64 --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
