<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Rounded square background (warm tan) -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="#E0CDA9"/>

  <!-- Stone entrance pylon (vertical accent, taller than the brick mass) -->
  <rect x="800" y="130" width="115" height="790" fill="#F2E8D2"/>

  <!-- Inset suggesting the "WADSWORTH HALL" sign panel -->
  <rect x="815" y="380" width="85" height="280" fill="#D9C9A8"/>

  <!-- Brick main mass -->
  <rect x="80" y="250" width="720" height="670" fill="#8E4F3D"/>

  <!-- Stepped/setback top floor -->
  <rect x="130" y="180" width="620" height="70" fill="#8E4F3D"/>

  <!-- Windows -->
  <g fill="#1F2C3D">
    <!-- Setback top floor: 6 windows -->
    <rect x="150" y="195" width="55" height="40"/>
    <rect x="255" y="195" width="55" height="40"/>
    <rect x="360" y="195" width="55" height="40"/>
    <rect x="465" y="195" width="55" height="40"/>
    <rect x="570" y="195" width="55" height="40"/>
    <rect x="675" y="195" width="55" height="40"/>

    <!-- Main mass: 4 rows x 6 columns -->
    <rect x="110" y="300" width="60" height="75"/>
    <rect x="230" y="300" width="60" height="75"/>
    <rect x="350" y="300" width="60" height="75"/>
    <rect x="470" y="300" width="60" height="75"/>
    <rect x="590" y="300" width="60" height="75"/>
    <rect x="710" y="300" width="60" height="75"/>

    <rect x="110" y="465" width="60" height="75"/>
    <rect x="230" y="465" width="60" height="75"/>
    <rect x="350" y="465" width="60" height="75"/>
    <rect x="470" y="465" width="60" height="75"/>
    <rect x="590" y="465" width="60" height="75"/>
    <rect x="710" y="465" width="60" height="75"/>

    <rect x="110" y="630" width="60" height="75"/>
    <rect x="230" y="630" width="60" height="75"/>
    <rect x="350" y="630" width="60" height="75"/>
    <rect x="470" y="630" width="60" height="75"/>
    <rect x="590" y="630" width="60" height="75"/>
    <rect x="710" y="630" width="60" height="75"/>

    <rect x="110" y="795" width="60" height="75"/>
    <rect x="230" y="795" width="60" height="75"/>
    <rect x="350" y="795" width="60" height="75"/>
    <rect x="470" y="795" width="60" height="75"/>
    <rect x="590" y="795" width="60" height="75"/>
    <rect x="710" y="795" width="60" height="75"/>
  </g>

  <!-- Yellow WELCOME canopy at the entrance -->
  <rect x="680" y="850" width="120" height="70" fill="#F2C94C"/>
</svg>
